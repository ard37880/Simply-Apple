name: Simply
options:
  bundleIdPrefix: com.studio86
  deploymentTarget:
    iOS: "17.0"
targets:
  Simply:
    type: application
    platform: iOS
    sources:
      - Simply/Sources
    resources:
      - Simply/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.studio86.simply
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Simply uses the camera to scan product barcodes and label photos."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
